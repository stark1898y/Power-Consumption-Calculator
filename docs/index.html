    <script>
        /**
         * PowerConsume 功耗计算器 - 纯前端版本
         * 包含 Chart.js 图表功能
         */

        // 全局变量
        let energyChart = null;
        let percentageChart = null;

        // ==================== 时间转换函数 ====================
        
        function convertToSeconds(value, unit) {
            switch (unit) {
                case "ms": return value / 1000;
                case "min": return value * 60;
                case "h": return value * 3600;
                case "天": return value * 24 * 3600;
                default: return value;
            }
        }

        function convertFromSeconds(seconds, unit) {
            switch (unit) {
                case "ms": return seconds * 1000;
                case "min": return seconds / 60;
                case "h": return seconds / 3600;
                case "天": return seconds / (24 * 3600);
                default: return seconds;
            }
        }

        // ==================== UI 更新函数 ====================

        function updateTotalVoltage() {
            const series = parseFloat(document.getElementById("series_count").value) || 1;
            const voltage = parseFloat(document.getElementById("cell_voltage").value) || 0;
            document.getElementById("total_voltage").value = (series * voltage).toFixed(2);
        }

        function updateTotalEndVoltage() {
            const series = parseFloat(document.getElementById("series_count").value) || 1;
            const endVoltage = parseFloat(document.getElementById("end_voltage").value) || 0;
            document.getElementById("total_end_voltage").value = (series * endVoltage).toFixed(2);
        }

        function updateTotalCapacity() {
            const parallel = parseFloat(document.getElementById("parallel_count").value) || 1;
            const capacity = parseFloat(document.getElementById("cell_capacity").value) || 0;
            document.getElementById("total_capacity").value = (parallel * capacity).toFixed(0);
        }

        // 绑定输入事件
        document.getElementById("series_count").addEventListener("input", () => {
            updateTotalVoltage();
            updateTotalEndVoltage();
            calculateSleepDuration();
        });
        document.getElementById("cell_voltage").addEventListener("input", updateTotalVoltage);
        document.getElementById("end_voltage").addEventListener("input", updateTotalEndVoltage);
        document.getElementById("parallel_count").addEventListener("input", updateTotalCapacity);
        document.getElementById("cell_capacity").addEventListener("input", updateTotalCapacity);

        function updateBatteryDefaults(type) {
            const defaults = {
                "锂电池": { voltage: 4.2, endVoltage: 3.6, capacity: 3500, series: 1, parallel: 1 },
                "一次性锂亚电池": { voltage: 3.6, endVoltage: 2.0, capacity: 19000, series: 1, parallel: 2 },
                "碱性干电池": { voltage: 1.5, endVoltage: 1.0, capacity: 2700, series: 2, parallel: 1 }
            };
            const def = defaults[type];
            if (def) {
                document.getElementById("cell_voltage").value = def.voltage;
                document.getElementById("end_voltage").value = def.endVoltage;
                document.getElementById("cell_capacity").value = def.capacity;
                document.getElementById("series_count").value = def.series;
                document.getElementById("parallel_count").value = def.parallel;
                updateTotalVoltage();
                updateTotalEndVoltage();
                updateTotalCapacity();
                calculateSleepDuration();
            }
        }

        // ==================== 表格操作函数 ====================

        function addModeRow() {
            const table = document.getElementById("modes_table").getElementsByTagName('tbody')[0];
            const newRow = table.insertRow();
            newRow.setAttribute('data-mode', '新模式');
            newRow.innerHTML = `
                <td><input type="text" value="新模式" class="mode_name"></td>
                <td>
                    <select class="current_unit">
                        <option value="uA">uA</option>
                        <option value="mA" selected>mA</option>
                    </select>
                </td>
                <td><input type="number" value="0" class="current_value"></td>
                <td>
                    <select class="duration_unit">
                        <option value="ms">ms</option>
                        <option value="s" selected>s</option>
                        <option value="min">min</option>
                        <option value="h">h</option>
                        <option value="天">天</option>
                    </select>
                </td>
                <td><input type="number" value="0" class="duration_value"></td>
                <td><input type="number" value="1" class="times_per_day"></td>
                <td><button onclick="deleteRow(this)" class="btn-danger">删除</button></td>
            `;
            
            // 绑定新行的输入事件
            bindRowEvents(newRow);
            calculateSleepDuration();
        }

        function deleteRow(button) {
            const row = button.parentNode.parentNode;
            row.parentNode.removeChild(row);
            calculateSleepDuration();
        }

        // ==================== 自动计算休眠时长 ====================

        function calculateSleepDuration() {
            const rows = document.getElementById("modes_table").getElementsByTagName('tbody')[0].rows;
            let totalActiveTimeSeconds = 0;
            let sleepRow = null;

            for (let i = 0; i < rows.length; i++) {
                const cells = rows[i].cells;
                const modeName = cells[0].getElementsByTagName('input')[0].value;
                
                if (modeName === "休眠") {
                    sleepRow = rows[i];
                    continue;
                }

                const durationUnit = cells[3].getElementsByTagName('select')[0].value;
                const durationValue = parseFloat(cells[4].getElementsByTagName('input')[0].value) || 0;
                const timesPerDay = parseInt(cells[5].getElementsByTagName('input')[0].value) || 0;

                const seconds = convertToSeconds(durationValue, durationUnit);
                totalActiveTimeSeconds += seconds * timesPerDay;
            }

            if (!sleepRow) {
                updateSleepStatus("未找到'休眠'模式", false);
                return;
            }

            const sleepDurationSeconds = Math.max(0, 24 * 3600 - totalActiveTimeSeconds);
            const sleepDurationUnit = sleepRow.cells[3].getElementsByTagName('select')[0].value;
            const sleepDurationValue = convertFromSeconds(sleepDurationSeconds, sleepDurationUnit);

            sleepRow.cells[4].getElementsByTagName('input')[0].value = sleepDurationValue.toFixed(2);
            
            const sleepPercent = ((sleepDurationSeconds / 86400) * 100).toFixed(1);
            updateSleepStatus(`休眠时长: ${sleepDurationValue.toFixed(2)} ${sleepDurationUnit} (${sleepPercent}%)`, true);
        }

        function updateSleepStatus(text, isActive) {
            const statusDiv = document.getElementById("sleepStatus");
            statusDiv.className = isActive ? "sleep-status active" : "sleep-status";
            statusDiv.innerHTML = `<span>💤 ${text}</span>`;
        }

        // 绑定表格行事件
        function bindRowEvents(row) {
            const inputs = row.querySelectorAll('input, select');
            inputs.forEach(input => {
                input.addEventListener('input', calculateSleepDuration);
                input.addEventListener('change', calculateSleepDuration);
            });
        }

        // 绑定所有现有行的事件
        function bindAllRowEvents() {
            const rows = document.getElementById("modes_table").getElementsByTagName('tbody')[0].rows;
            for (let i = 0; i < rows.length; i++) {
                bindRowEvents(rows[i]);
            }
        }

        // ==================== 数据收集函数 ====================

        function collectData() {
            const modes = [];
            const rows = document.getElementById("modes_table").getElementsByTagName('tbody')[0].rows;

            for (let i = 0; i < rows.length; i++) {
                const cells = rows[i].cells;
                modes.push({
                    mode: cells[0].getElementsByTagName('input')[0].value,
                    current_unit: cells[1].getElementsByTagName('select')[0].value,
                    current_value: cells[2].getElementsByTagName('input')[0].value,
                    duration_unit: cells[3].getElementsByTagName('select')[0].value,
                    duration_value: cells[4].getElementsByTagName('input')[0].value,
                    times_per_day: cells[5].getElementsByTagName('input')[0].value
                });
            }

            return {
                battery_type: document.getElementById("battery_type").value,
                experience_factor: document.getElementById("experience_factor").value,
                series_count: document.getElementById("series_count").value,
                parallel_count: document.getElementById("parallel_count").value,
                cell_voltage: document.getElementById("cell_voltage").value,
                end_voltage: document.getElementById("end_voltage").value,
                cell_capacity: document.getElementById("cell_capacity").value,
                modes: modes,
                calc_mode: document.querySelector('input[name="calc_mode"]:checked').value,
                input_value: document.getElementById("input_value").value,
                input_unit: document.getElementById("input_unit").value
            };
        }

        // ==================== 核心计算函数 ====================

        function calculate() {
            const data = collectData();

            const series = parseInt(data.series_count) || 1;
            const parallel = parseInt(data.parallel_count) || 1;
            const cellVoltage = parseFloat(data.cell_voltage) || 3.6;
            const endVoltage = parseFloat(data.end_voltage) || 3.0;
            const cellCapacity = parseFloat(data.cell_capacity) || 19000;
            const experienceFactor = parseFloat(data.experience_factor) || 0.7;

            const totalVoltage = cellVoltage * series;
            const totalCapacity = cellCapacity * parallel;
            const averageVoltage = (totalVoltage + endVoltage * series) / 2;

            const modes = data.modes;
            let dailyTotalEnergy = 0;
            const modeDetails = [];

            for (const mode of modes) {
                const currentUnit = mode.current_unit;
                const currentValue = parseFloat(mode.current_value) || 0;
                const durationUnit = mode.duration_unit;
                const durationValue = parseFloat(mode.duration_value) || 0;
                const timesPerDay = parseInt(mode.times_per_day) || 0;

                const currentMa = currentUnit === "uA" ? currentValue / 1000 : currentValue;
                const seconds = convertToSeconds(durationValue, durationUnit);

                const energyPerCycleMwh = (currentMa * seconds * averageVoltage) / 3600;
                const dailyEnergyMwh = energyPerCycleMwh * timesPerDay;
                dailyTotalEnergy += dailyEnergyMwh;

                modeDetails.push({
                    name: mode.mode,
                    current_ma: currentMa,
                    seconds: seconds,
                    times_per_day: timesPerDay,
                    energy_per_cycle_mwh: energyPerCycleMwh,
                    daily_energy_mwh: dailyEnergyMwh
                });
            }

            const calcMode = data.calc_mode;
            const inputValue = parseFloat(data.input_value) || 5000;
            const inputUnit = data.input_unit;

            let result = {};

            if (calcMode === "续航时间") {
                const totalEnergyMwh = totalCapacity * averageVoltage;
                const usableEnergyMwh = totalEnergyMwh * experienceFactor;
                const days = dailyTotalEnergy > 0 ? usableEnergyMwh / dailyTotalEnergy : Infinity;
                const hours = days * 24;
                const years = days / 365.25;

                result = {
                    type: "battery_life",
                    voltage: totalVoltage,
                    capacity: totalCapacity,
                    average_voltage: averageVoltage,
                    total_energy_mwh: totalEnergyMwh,
                    usable_energy_mwh: usableEnergyMwh,
                    experience_factor: experienceFactor,
                    daily_total_energy: dailyTotalEnergy,
                    days: days,
                    hours: hours,
                    years: years,
                    modes: modeDetails
                };
            } else {
                const inputSeconds = convertToSeconds(inputValue, "s");
                const requiredEnergyMwh = dailyTotalEnergy * (inputSeconds / 86400);
                const avgVoltage = (totalVoltage + endVoltage) / 2;
                const requiredCapacity = experienceFactor > 0 ? requiredEnergyMwh / (avgVoltage * experienceFactor) : Infinity;

                result = {
                    type: "required_capacity",
                    input_value: inputValue,
                    input_unit: inputUnit,
                    input_seconds: inputSeconds,
                    voltage: totalVoltage,
                    average_voltage: avgVoltage,
                    experience_factor: experienceFactor,
                    daily_total_energy: dailyTotalEnergy,
                    required_energy_mwh: requiredEnergyMwh,
                    required_capacity: requiredCapacity,
                    modes: modeDetails
                };
            }

            displayResult(result);
            updateCharts(modeDetails);
        }

        // ==================== 结果显示函数 ====================

        function displayResult(result) {
            let html = "<h3>📊 计算结果</h3>";

            if (result.type === "battery_life") {
                html += `
                    <div class="form-group">
                        <p><strong>总电压:</strong> <span class="highlight">${result.voltage.toFixed(2)} V</span></p>
                        <p><strong>总容量:</strong> <span class="highlight">${result.capacity.toFixed(2)} mAh</span></p>
                        <p><strong>平均电压:</strong> ${result.average_voltage.toFixed(2)} V</p>
                    </div>
                    <div class="form-group">
                        <p><strong>总能量:</strong> ${result.total_energy_mwh.toFixed(2)} mWh</p>
                        <p><strong>可用能量:</strong> <span class="highlight">${result.usable_energy_mwh.toFixed(2)} mWh</span> (×${result.experience_factor})</p>
                        <p><strong>每日功耗:</strong> ${result.daily_total_energy.toFixed(4)} mWh</p>
                    </div>
                    <div class="result-box">
                        <div>🔋 可使用时间</div>
                        <div class="big-number">${result.hours.toFixed(2)} 小时</div>
                        <div>${result.days.toFixed(2)} 天 | ${result.years.toFixed(2)} 年</div>
                    </div>
                `;
            } else {
                html += `
                    <div class="form-group">
                        <p><strong>目标续航:</strong> ${result.input_value} ${result.input_unit} (${result.input_seconds.toFixed(2)} 秒)</p>
                        <p><strong>每日功耗:</strong> ${result.daily_total_energy.toFixed(4)} mWh</p>
                    </div>
                    <div class="result-box">
                        <div>🔋 所需容量</div>
                        <div class="big-number">${result.required_capacity.toFixed(2)} mAh</div>
                        <div>考虑了 ${result.experience_factor} 的经验系数</div>
                    </div>
                `;
            }

            html += `
                <h4>工作模式详情:</h4>
                <ul>
            `;
            result.modes.forEach(mode => {
                html += `<li><strong>${mode.name}:</strong> ${mode.current_ma.toFixed(2)} mA, ${mode.seconds.toFixed(2)} s, ${mode.daily_energy_mwh.toFixed(4)} mWh/天</li>`;
            });
            html += "</ul>";

            document.getElementById("result").innerHTML = html;
        }

        function clearResult() {
            document.getElementById("result").innerHTML = "";
            document.getElementById("chartContainer").style.display = "none";
        }

        // ==================== Chart.js 图表功能 ====================

        function updateCharts(modeDetails) {
            const container = document.getElementById("chartContainer");
            container.style.display = "block";

            const labels = modeDetails.map(m => m.name);
            const energies = modeDetails.map(m => m.daily_energy_mwh);
            const totalEnergy = energies.reduce((a, b) => a + b, 0);
            const percentages = energies.map(e => ((e / totalEnergy) * 100).toFixed(1));

            // 图表颜色
            const colors = [
                'rgba(102, 126, 234, 0.8)',
                'rgba(118, 75, 162, 0.8)',
                'rgba(255, 107, 107, 0.8)',
                'rgba(72, 187, 120, 0.8)',
                'rgba(255, 215, 0, 0.8)',
                'rgba(0, 206, 209, 0.8)',
                'rgba(255, 165, 0, 0.8)',
                'rgba(147, 112, 219, 0.8)'
            ];
            const borderColors = colors.map(c => c.replace('0.8', '1'));

            // 销毁现有图表
            if (energyChart) energyChart.destroy();
            if (percentageChart) percentageChart.destroy();

            // 柱状图 - 每日能耗（顶部标注数值）
            const ctx1 = document.getElementById('energyChart').getContext('2d');
            energyChart = new Chart(ctx1, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '每日能耗 (mWh)',
                        data: energies,
                        backgroundColor: colors.slice(0, labels.length),
                        borderColor: borderColors.slice(0, labels.length),
                        borderWidth: 2,
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: {
                            display: true,
                            text: '各模式每日能耗',
                            font: { size: 16, weight: 'bold' }
                        },
                        legend: {
                            display: false
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return `${context.parsed.y.toFixed(4)} mWh`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: '能耗 (mWh)'
                            }
                        },
                        x: {
                            title: {
                                display: true,
                                text: '工作模式'
                            }
                        }
                    }
                },
                plugins: [{
                    id: 'barValueLabels',
                    afterDatasetsDraw(chart) {
                        const { ctx, data, scales: { x, y } } = chart;
                        ctx.save();
                        data.datasets[0].data.forEach((value, i) => {
                            const xPos = x.getPixelForValue(i);
                            const yPos = y.getPixelForValue(value);
                            ctx.fillStyle = '#2d3748';
                            ctx.font = 'bold 12px -apple-system, sans-serif';
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'bottom';
                            ctx.fillText(value < 0.01 ? value.toExponential(2) : value.toFixed(2), xPos, yPos - 6);
                        });
                        ctx.restore();
                    }
                }]
            });

            // 饼图 - 能耗占比（扇形标注百分比）
            const ctx2 = document.getElementById('percentageChart').getContext('2d');
            percentageChart = new Chart(ctx2, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: percentages,
                        backgroundColor: colors.slice(0, labels.length),
                        borderColor: borderColors.slice(0, labels.length),
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: {
                            display: true,
                            text: '能耗占比分布',
                            font: { size: 16, weight: 'bold' }
                        },
                        legend: {
                            position: 'right',
                            labels: {
                                padding: 15,
                                font: { size: 13 },
                                usePointStyle: true,
                                generateLabels: function(chart) {
                                    const data = chart.data;
                                    return data.labels.map((label, i) => ({
                                        text: `${label}  ${percentages[i]}%`,
                                        fillStyle: colors[i],
                                        strokeStyle: borderColors[i],
                                        lineWidth: 2,
                                        index: i,
                                        pointStyle: 'rectRounded'
                                    }));
                                }
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const idx = context.dataIndex;
                                    return `${labels[idx]}: ${percentages[idx]}% (${energies[idx].toFixed(4)} mWh)`;
                                }
                            }
                        }
                    }
                },
                plugins: [{
                    id: 'doughnutPercentLabels',
                    afterDraw(chart) {
                        const { ctx, data } = chart;
                        const meta = chart.getDatasetMeta(0);
                        ctx.save();
                        meta.data.forEach((arc, i) => {
                            const pct = percentages[i];
                            if (pct < 3) return; // 占比太小不标注，避免拥挤
                            const pos = arc.tooltipPosition();
                            ctx.fillStyle = '#fff';
                            ctx.font = 'bold 13px -apple-system, sans-serif';
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'middle';
                            // 深色背景上白色文字加阴影
                            ctx.shadowColor = 'rgba(0,0,0,0.3)';
                            ctx.shadowBlur = 3;
                            ctx.fillText(`${pct}%`, pos.x, pos.y);
                            ctx.shadowColor = 'transparent';
                        });
                        ctx.restore();
                    }
                }]
            });
        }

        // ==================== 初始化 ====================

        window.onload = function() {
            updateTotalVoltage();
            updateTotalEndVoltage();
            updateTotalCapacity();
            bindAllRowEvents();
            calculateSleepDuration();
        };
    </script>
</body>
</html>
